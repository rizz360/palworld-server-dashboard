name: palworld-server-dashboard

# Copy .env.example to .env and fill it in — Docker Compose auto-loads .env from
# this directory, so the ${...} values below come from there.

services:
  palworld-server-dashboard:
    image: ${PALWORLD_SERVER_DASHBOARD_IMAGE:-ghcr.io/rnz01/palworld-server-dashboard:latest}
    container_name: palworld-server-dashboard
    restart: unless-stopped
    ports:
      - "${PALWORLD_SERVER_DASHBOARD_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Fail loudly at `up` time if these are unset, instead of silently booting
      # an unloginable panel.
      PANEL_INITIAL_ADMIN_PASSWORD: ${PANEL_INITIAL_ADMIN_PASSWORD:?copy .env.example to .env and set the panel + game passwords}
      PALWORLD_ADMIN_PASSWORD: ${PALWORLD_ADMIN_PASSWORD:?set PALWORLD_ADMIN_PASSWORD (the real Palworld REST admin password) in .env}
      PANEL_INITIAL_MOD_PASSWORD: ${PANEL_INITIAL_MOD_PASSWORD:-}
      # 127.0.0.1 is the container itself — point this at the game host.
      PALWORLD_REST_URL: ${PALWORLD_REST_URL:-http://host.docker.internal:8212}
      PANEL_AUTH_FILE: /app/data/panel-auth.json
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-false}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      # FPS history ring written by the palworld-fps-sampler sidecar below.
      PALWORLD_FPS_HISTORY_FILE: /metrics/fps-history.json
    volumes:
      # Persist the panel credential store across container recreation.
      - palworld-dashboard-data:/app/data
      # Read-only view of the FPS ring maintained by the sampler sidecar.
      - palworld-fps-metrics:/metrics:ro
    extra_hosts:
      # Lets PALWORLD_REST_URL=host.docker.internal reach the host on Linux.
      - "host.docker.internal:host-gateway"

  # Server-side FPS history sampler: keeps the dashboard's FPS histogram
  # populated for the full window even while nobody has the panel open.
  # Stdlib-only Python — no image build, no pip installs.
  palworld-fps-sampler:
    image: python:3.12-alpine
    container_name: palworld-fps-sampler
    restart: unless-stopped
    command: ["python", "/sampler/palworld-fps-sampler.py"]
    environment:
      PALWORLD_REST_URL: ${PALWORLD_REST_URL:-http://host.docker.internal:8212}
      PALWORLD_ADMIN_PASSWORD: ${PALWORLD_ADMIN_PASSWORD:?set PALWORLD_ADMIN_PASSWORD (the real Palworld REST admin password) in .env}
      FPS_HISTORY_FILE: /metrics/fps-history.json
      FPS_SAMPLE_SECONDS: ${FPS_SAMPLE_SECONDS:-5}
      FPS_WINDOW_MINUTES: ${FPS_WINDOW_MINUTES:-60}
    volumes:
      - ./scripts/fps-sampler:/sampler:ro
      - palworld-fps-metrics:/metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  palworld-dashboard-data:
  palworld-fps-metrics:
