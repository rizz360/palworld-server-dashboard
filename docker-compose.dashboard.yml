name: palworld-dashboard

services:
  dashboard:
    image: ghcr.io/rnz01/palworld-server-dashboard:latest
    container_name: palworld-dashboard
    restart: unless-stopped
    user: "0:0"
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: ${PALWORLD_SERVER_DASHBOARD_PORT:-3000}
      HOSTNAME: 0.0.0.0

      PANEL_INITIAL_ADMIN_PASSWORD: ${PANEL_INITIAL_ADMIN_PASSWORD}
      PANEL_INITIAL_MOD_PASSWORD: ${PANEL_INITIAL_MOD_PASSWORD:-}
      PANEL_AUTH_FILE: /app/data/panel-auth.json

      PALWORLD_REST_URL: ${PALWORLD_REST_URL}
      PALWORLD_ADMIN_PASSWORD: ${PALWORLD_ADMIN_PASSWORD}
      PALWORLD_DOCKER_CONTAINER: ${PALWORLD_DOCKER_CONTAINER:-pro-palworld-1}

      # In-process FPS history sampler (replaced the former fps-sampler
      # service). The ring lives in the persisted data volume.
      PALWORLD_FPS_SAMPLER: ${PALWORLD_FPS_SAMPLER:-true}
      PALWORLD_FPS_HISTORY_FILE: /app/data/fps-history.json
      FPS_SAMPLE_SECONDS: ${FPS_SAMPLE_SECONDS:-5}
      FPS_WINDOW_MINUTES: ${FPS_WINDOW_MINUTES:-60}

      RATE_LIMIT_TRUST_PROXY: "false"
      DEMO_MODE: "0"

      # Opt-in public read-only status page at /view (no panel password).
      PUBLIC_VIEW_ENABLED: ${PUBLIC_VIEW_ENABLED:-false}
      PUBLIC_VIEW_CACHE_SECONDS: ${PUBLIC_VIEW_CACHE_SECONDS:-10}
      PUBLIC_VIEW_ANONYMIZE_NAMES: ${PUBLIC_VIEW_ANONYMIZE_NAMES:-false}
    volumes:
      - dashboard-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

volumes:
  dashboard-data:
